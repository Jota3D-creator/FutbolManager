<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol 7 Manager</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #05080d;
      color: white;
      padding: 24px;
    }

    h1 {
      color: #27e36d;
    }

    .panel {
      background: #0b121b;
      border: 1px solid #263241;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 12px;
      margin: 6px 0 12px;
      border-radius: 10px;
      border: 1px solid #263241;
      background: #111b27;
      color: white;
    }

    button {
      background: #27e36d;
      color: #031007;
      border: 0;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .player-card {
      background: #111b27;
      border: 1px solid #263241;
      border-radius: 16px;
      padding: 16px;
    }

    .overall {
      color: #27e36d;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .stat {
      margin: 8px 0;
      font-size: 14px;
    }

    .bar {
      height: 7px;
      background: #263241;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
    }

    .bar-fill {
      height: 100%;
      background: #27e36d;
    }

    .delete {
      background: transparent;
      color: #ff5b5b;
      border: 1px solid #ff5b5b;
    }
  </style>
</head>

<body>
  <h1>Fútbol 7 Manager</h1>

  <div class="panel">
    <h2>Agregar jugador</h2>

    <input id="name" placeholder="Nombre">
    <input id="tecnica" type="number" placeholder="Técnica">
    <input id="pase" type="number" placeholder="Pase">
    <input id="definicion" type="number" placeholder="Definición">
    <input id="defensa" type="number" placeholder="Defensa">
    <input id="fisico" type="number" placeholder="Estado físico">
    <input id="inteligencia" type="number" placeholder="Inteligencia táctica">
    <input id="compromiso" type="number" placeholder="Compromiso">

    <button onclick="addPlayer()">Agregar jugador</button>
  </div>

  <div class="panel">
    <h2>Jugadores cargados</h2>
    <div id="playersList" class="players-grid"></div>
  </div>

  <script>
    var defaultPlayers = [
      { name: "Flego", tecnica: 70, pase: 60, definicion: 80, defensa: 80, fisico: 80, inteligencia: 75, compromiso: 85 },
      { name: "Gabi", tecnica: 60, pase: 60, definicion: 70, defensa: 80, fisico: 65, inteligencia: 65, compromiso: 85 },
      { name: "Rodri", tecnica: 80, pase: 70, definicion: 85, defensa: 50, fisico: 60, inteligencia: 65, compromiso: 85 },
      { name: "Rober", tecnica: 75, pase: 70, definicion: 80, defensa: 80, fisico: 65, inteligencia: 70, compromiso: 85 },
      { name: "Cabe", tecnica: 65, pase: 65, definicion: 75, defensa: 60, fisico: 55, inteligencia: 60, compromiso: 75 },
      { name: "Carlitos", tecnica: 70, pase: 70, definicion: 70, defensa: 80, fisico: 85, inteligencia: 65, compromiso: 85 },
      { name: "Niko", tecnica: 80, pase: 65, definicion: 70, defensa: 60, fisico: 70, inteligencia: 65, compromiso: 70 },
      { name: "Joni", tecnica: 60, pase: 70, definicion: 80, defensa: 40, fisico: 55, inteligencia: 75, compromiso: 60 },
      { name: "Nico", tecnica: 80, pase: 65, definicion: 70, defensa: 60, fisico: 75, inteligencia: 70, compromiso: 70 },
      { name: "Leo 🇮🇹", tecnica: 75, pase: 80, definicion: 85, defensa: 40, fisico: 70, inteligencia: 80, compromiso: 65 },
      { name: "Tiziano", tecnica: 70, pase: 70, definicion: 70, defensa: 75, fisico: 80, inteligencia: 70, compromiso: 70 },
      { name: "Facu", tecnica: 80, pase: 60, definicion: 70, defensa: 60, fisico: 60, inteligencia: 60, compromiso: 60 },
      { name: "Cuchu", tecnica: 50, pase: 65, definicion: 60, defensa: 60, fisico: 50, inteligencia: 50, compromiso: 70 },
      { name: "Dylan", tecnica: 75, pase: 70, definicion: 70, defensa: 70, fisico: 75, inteligencia: 70, compromiso: 65 }
    ];

    var players = [];

    function loadPlayers() {
      var saved = localStorage.getItem("futbol7_players");

      if (saved) {
        players = JSON.parse(saved);
      } else {
        players = defaultPlayers;
        savePlayers();
      }

      renderPlayers();
    }

    function savePlayers() {
      localStorage.setItem("futbol7_players", JSON.stringify(players));
    }

    function getValue(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function addPlayer() {
      var name = document.getElementById("name").value.trim();

      if (name === "") {
        alert("Poné el nombre del jugador");
        return;
      }

      players.push({
        name: name,
        tecnica: getValue("tecnica"),
        pase: getValue("pase"),
        definicion: getValue("definicion"),
        defensa: getValue("defensa"),
        fisico: getValue("fisico"),
        inteligencia: getValue("inteligencia"),
        compromiso: getValue("compromiso")
      });

      savePlayers();
      clearForm();
      renderPlayers();
    }

    function clearForm() {
      document.getElementById("name").value = "";
      document.getElementById("tecnica").value = "";
      document.getElementById("pase").value = "";
      document.getElementById("definicion").value = "";
      document.getElementById("defensa").value = "";
      document.getElementById("fisico").value = "";
      document.getElementById("inteligencia").value = "";
      document.getElementById("compromiso").value = "";
    }

    function getOverall(player) {
      return Math.round(
        (
          player.tecnica +
          player.pase +
          player.definicion +
          player.defensa +
          player.fisico +
          player.inteligencia +
          player.compromiso
        ) / 7
      );
    }

    function renderPlayers() {
      var container = document.getElementById("playersList");
      container.innerHTML = "";

      for (var i = 0; i < players.length; i++) {
        var p = players[i];
        var ovr = getOverall(p);

        container.innerHTML += `
          <div class="player-card">
            <h3>${p.name}</h3>
            <div class="overall">${ovr} OVR</div>
            ${stat("Técnica", p.tecnica)}
            ${stat("Pase", p.pase)}
            ${stat("Definición", p.definicion)}
            ${stat("Defensa", p.defensa)}
            ${stat("Físico", p.fisico)}
            ${stat("Inteligencia", p.inteligencia)}
            ${stat("Compromiso", p.compromiso)}
            <button class="delete" onclick="deletePlayer(${i})">Borrar</button>
          </div>
        `;
      }
    }

    function stat(label, value) {
      return `
        <div class="stat">
          ${label}: ${value}
          <div class="bar">
            <div class="bar-fill" style="width:${value}%"></div>
          </div>
        </div>
      `;
    }

    function deletePlayer(index) {
      players.splice(index, 1);
      savePlayers();
      renderPlayers();
    }

    loadPlayers();
  </script>
</body>
</html>
