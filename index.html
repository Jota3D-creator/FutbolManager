<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fútbol 7 Manager</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #05080d;
      color: white;
      padding: 24px;
    }

    h1 {
      color: #27e36d;
    }

    button {
      background: #27e36d;
      color: #031007;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin: 6px;
    }

    button.secondary {
      background: transparent;
      color: white;
      border: 1px solid #2d3a4a;
    }

    .section {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #263241;
      border-radius: 16px;
      background: #0b121b;
    }

    .section.active {
      display: block;
    }

    input {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 8px 0 16px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #263241;
      background: #111b27;
      color: white;
    }

    .player-card {
      padding: 14px;
      border: 1px solid #263241;
      border-radius: 12px;
      margin: 10px 0;
      background: #111b27;
      max-width: 420px;
    }
  </style>
</head>

<body>
  <h1>Fútbol 7 Manager</h1>

  <button onclick="showSection('jugadores')">Base de jugadores</button>
  <button onclick="showSection('partido')">Armar partido</button>
  <button onclick="showSection('equipos')">Equipos</button>

  <section id="jugadores" class="section active">
    <h2>Base de jugadores</h2>

    <label>Nombre del jugador</label>
    <input id="playerName" type="text" placeholder="Ej: Flego">

    <label>Técnica</label>
    <input id="tecnica" type="number" min="1" max="100" placeholder="70">

    <label>Pase</label>
    <input id="pase" type="number" min="1" max="100" placeholder="60">

    <label>Definición</label>
    <input id="definicion" type="number" min="1" max="100" placeholder="80">

    <button onclick="addPlayer()">Agregar jugador</button>

    <h3>Jugadores cargados</h3>
    <div id="playersList"></div>
  </section>

  <section id="partido" class="section">
    <h2>Armar partido</h2>

    <label>Día</label>
    <input id="matchDate" type="date">

    <label>Hora</label>
    <input id="matchTime" type="time">

    <label>Lugar</label>
    <input id="matchPlace" type="text" placeholder="Ej: Cancha La Verde">

    <label>Link de Google Maps</label>
    <input id="matchMap" type="text" placeholder="Pegá el link del mapa">

    <button onclick="saveMatch()">Guardar partido</button>

    <div id="matchInfo"></div>
  </section>

  <section id="equipos" class="section">
    <h2>Equipos</h2>
    <p>Acá después vamos a generar los equipos.</p>
    <div id="teamsInfo"></div>
  </section>

  <script>
    var players = [];
    var match = {};

    function showSection(sectionId) {
      var sections = document.querySelectorAll('.section');

      for (var i = 0; i < sections.length; i++) {
        sections[i].classList.remove('active');
      }

      document.getElementById(sectionId).classList.add('active');
    }

    function addPlayer() {
      var name = document.getElementById('playerName').value;
      var tecnica = document.getElementById('tecnica').value;
      var pase = document.getElementById('pase').value;
      var definicion = document.getElementById('definicion').value;

      if (name === '') {
        alert('Poné el nombre del jugador');
        return;
      }

      var player = {
        name: name,
        tecnica: tecnica,
        pase: pase,
        definicion: definicion
      };

      players.push(player);

      document.getElementById('playerName').value = '';
      document.getElementById('tecnica').value = '';
      document.getElementById('pase').value = '';
      document.getElementById('definicion').value = '';

      renderPlayers();
    }

    function renderPlayers() {
      var container = document.getElementById('playersList');
      container.innerHTML = '';

      for (var i = 0; i < players.length; i++) {
        var player = players[i];

        container.innerHTML += `
          <div class="player-card">
            <strong>${player.name}</strong>
            <p>Técnica: ${player.tecnica}</p>
            <p>Pase: ${player.pase}</p>
            <p>Definición: ${player.definicion}</p>
          </div>
        `;
      }
    }

    function saveMatch() {
      match.date = document.getElementById('matchDate').value;
      match.time = document.getElementById('matchTime').value;
      match.place = document.getElementById('matchPlace').value;
      match.map = document.getElementById('matchMap').value;

      document.getElementById('matchInfo').innerHTML = `
        <h3>Partido guardado</h3>
        <p>Día: ${match.date}</p>
        <p>Hora: ${match.time}</p>
        <p>Lugar: ${match.place}</p>
        <p>Mapa: ${match.map}</p>
      `;
    }
  </script>
</body>
</html>
